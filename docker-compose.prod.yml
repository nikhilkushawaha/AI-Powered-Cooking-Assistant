version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chefai_backend
    restart: always
    expose:
      - "8000"
      # Not exposed directly — Nginx proxies it
    env_file:
      - ./backend/.env.production
    volumes:
      - chroma_data:/app/chroma_db
      - backend_logs:/app/logs
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - chefai_network

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: chefai_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chefai_network

  # ── Certbot for SSL ──────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: chefai_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email your@email.com
      --agree-tos
      --no-eff-email
      -d api.yourdomain.com

volumes:
  chroma_data:
    driver: local
  backend_logs:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

networks:
  chefai_network:
    driver: bridge
